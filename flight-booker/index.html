<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Flight Booker</title>
    <script src="./script.js" defer></script>
</head>

<body>
    <main>
        <section class="header">
            <h1>Flight Booker</h1>
        </section>

        <section class="content">

            <div class="tripTypeDiv">
                <label for="tripType">One way or return:</label>
                <select name="tripType" id="tripType">
                    <option value="one-way">One way</option>
                    <option value="return">Return</option>
                </select>
            </div>

            <div class="departureDateDiv">
                <label for="departureDate">Departure Date (format: DD.MM.YYYY) :</label>
                <input type="text" id="departureDate" name="departureDate" placeholder="25.12.1995"
                    alt="input date for departure date">
            </div>

            <div class="returnDateDiv">
                <label for="returnDate">Departure Date (format: DD.MM.YYYY) :</label>
                <input type="text" id="returnDate" name="returnDate" placeholder="25.12.1995"
                    alt="input date for departure date">
            </div>
            
        </section>
    </main>
</body>

</html>

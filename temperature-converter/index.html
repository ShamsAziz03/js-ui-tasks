<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Temperature Converter</title>
    <script src="./script.js" defer></script>
</head>

<body>
    <main>
        <section class="header">
            <h1>Temperature Converter</h1>
        </section>
        <section class="content">
            <div class="celsiusDiv">
                <input type="text" id="celsiusTmp" placeholder="ex. 35" alt="input text for Celsius Temperature">
                <label for="celsiusTmp">Celsius</label>
            </div>
            <span>=</span>
            <div class="fahrenheitDiv">
                <input type="text" id="fahrenheitTmp" placeholder="ex. 35" alt="input text for Fahrenheit Temperature">
                <label for="fahrenheitTmp">Fahrenheit</label>
            </div>
        </section>
    </main>
</body>

</html>
